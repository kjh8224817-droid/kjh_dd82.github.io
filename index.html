<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Blog</title>
    <link rel="stylesheet" href="css/style.css?v=1.1">
    <!-- Prism.js CSS (CDN) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" rel="stylesheet" />
</head>

<body>
    <header>
        <h1><a href="index.html">My Blog</a></h1>
        <div class="header-controls">
            <input type="text" id="search-input" placeholder="검색어를 입력하세요...">
            <button id="theme-toggle">🌗</button>
        </div>
    </header>

    <main>
        <div id="tag-filter"></div>
        <ul id="post-list">
            <!-- 게시글 목록이 여기에 동적으로 추가됩니다. -->
        </ul>
    </main>

    <footer>
        <p>&copy; 2026 My GitHub Blog</p>
    </footer>

    <!-- marked.js (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Prism.js (CDN) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>

    <script src="js/theme.js"></script>
    <script src="js/search.js"></script>
    <script src="js/app.js"></script>

    <!-- ===== 포트폴리오 AI 챗봇 ===== -->

    <script>
        window.ChatWidgetConfig = {
            webhook: {
                url: 'https://kjh82248.app.n8n.cloud/webhook-test/chat'
            },
            branding: {
                name: 'Portfolio AI',
                welcomeText: '안녕하세요! 저에 대해 궁금한 점을 물어보세요 😊',
                responseTimeText: '잠시 후 답변드릴게요'
            },
            style: {
                primaryColor: '#5c6bc0',
                position: 'right'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/gh/juansebsol/n8n-chatbot-template@latest/chat-widget.js"></script>
</body>

</html>
